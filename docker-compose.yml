services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/elva-support
      CORS_ORIGIN: http://localhost:8080
      NODE_ENV: production
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
  uploads_data:
