# Render Blueprint — ELVA Support API
# Deploy: Render Dashboard → New Blueprint → select this repo
# MongoDB: use MongoDB Atlas (create elva-support-prod database for production)

services:
  - type: web
    name: elva-support-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: System
      - key: ADMIN_LAST_NAME
        value: Administrator
      - key: NOTIFICATION_PROVIDER
        value: RESEND
      - key: NOTIFICATION_FALLBACK_ENABLED
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_NAME
        value: ELVA Support
      - key: EMAIL_SUPPORT_ADDRESS
        value: support@elvatech.in
      - key: EMAIL_INBOUND_ENABLED
        value: "true"
      - key: EMAIL_INBOUND_PROVIDER
        value: webhook
      - key: EMAIL_INBOUND_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_IMAP_HOST
        value: imap.gmail.com
      - key: EMAIL_IMAP_PORT
        value: "993"
      - key: EMAIL_IMAP_SECURE
        value: "true"
      - key: EMAIL_IMAP_USER
        sync: false
      - key: EMAIL_IMAP_PASSWORD
        sync: false
      - key: EMAIL_IMAP_MAILBOX
        value: support@elvatech.in
      - key: EMAIL_IMAP_POLL_MS
        value: "120000"
      - key: EMAIL_IMAP_POLL_TIMEOUT_MS
        value: "120000"
      - key: EMAIL_IMAP_BATCH_SIZE
        value: "10"
      - key: EMAIL_IMAP_LOOKBACK_DAYS
        value: "3"
      - key: LOG_OTP_TO_CONSOLE
        value: "false"
      - key: EXPOSE_OTP_IN_RESPONSE
        value: "false"
      - key: LOG_VIEWER_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_MOCK
        value: "true"
